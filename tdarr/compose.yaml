services:
  tdarr:
    container_name: tdarr
    image: ${TDARR_IMAGE:-docker.io/haveagitgat/tdarr}:${TDARR_IMAGE_TAG:-latest}
    profiles: [ "${TDARR_PROFILE:-quality}" ]
    extends:
      file: ../compose.extend.yaml
      service: "gpu-${USE_GPU:-none}"
    restart: unless-stopped
    networks:
      - external
      - internal
    ports:
      - "8266:8266" # server port
    depends_on:
      traefik:
        condition: service_started
        restart: false
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "3"
    environment:
      # Default
      TZ: "${TZ:-Europe/London}"
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      UMASK: "000"
      # Image
      # serverIP: "0.0.0.0"
      # serverPort: "8266"
      # webUIPort: "8265"
      UMASK_SET: "000"
      internalNode: "true"
      inContainer: "true"
      nodeName: "Server"
      transcodegpuWorkers: "0"
      transcodecpuWorkers: "0"
      healthcheckgpuWorkers: "0"
      healthcheckcpuWorkers: "2"
    volumes:
      - "./config/server:/app/server"
      - "./config/config:/app/configs"
      - "./logs:/app/logs"
      - "./tmp:/tmp"
      - "$PATH_MOVIES:/data/movies"
      - "$PATH_TV:/data/tv"
    labels:
      com.centurylinklabs.watchtower.monitor-only: "true"
      deunhealth.restart.on.unhealthy: "false"
      homepage.group: "Media"
      homepage.name: "Tdarr"
      homepage.icon: "tdarr.png"
      homepage.href: "https://${TDARR_SUBDOMAIN:-tdarr}.${DOMAIN}/"
      homepage.description: "Video transcoding"
      homepage.widget.type: "tdarr"
      homepage.widget.url: "http://tdarr.internal:8265"
      traefik.enable: "true"
      traefik.http.routers.tdarr.rule: "Host(`${TDARR_SUBDOMAIN:-tdarr}.${DOMAIN}`)"
      traefik.http.routers.tdarr.middlewares: "tdarr,tinyauth,error-pages"
      traefik.http.services.tdarr.loadbalancer.server.port: "8265"
      traefik.http.middlewares.tdarr.headers.accessControlAllowCredentials: "true"
      traefik.http.middlewares.tdarr.headers.accessControlAllowHeaders: "content-type"
      traefik.http.middlewares.tdarr.headers.accessControlAllowOriginList: "https://${DOMAIN}"
    healthcheck:
      start_period: "150s"
      test: "curl --connect-timeout 5 --silent --show-error --fail http://localhost:8265/"
