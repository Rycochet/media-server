services:
  sabnzbd:
    container_name: sabnzbd
    image: ${SABNZBD_IMAGE:-lscr.io/linuxserver/sabnzbd}:${SABNZBD_IMAGE_TAG:-latest}
    profiles: [ "${SABNZBD_PROFILE:-download}" ]
    extends:
      file: ../compose.extend.yaml
      service: "vpn-${USE_VPN:-false}"
    restart: unless-stopped
    networks:
      - external
      - internal
    depends_on:
      traefik:
        condition: service_started
        restart: false
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "3"
    environment:
      # Default
      TZ: "${TZ:-Europe/London}"
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      UMASK: "000"
    volumes:
      - "/etc/localtime:/etc/localtime:ro"
      - "./config:/config"
      - "./logs:/config/logs"
      - "./backup:/data/backup"
      - "$PATH_DOWNLOADS:/data/Downloads"
    labels:
      deunhealth.restart.on.unhealthy: "true"
      homepage.group: "Download"
      homepage.name: "SABnzbd"
      homepage.icon: "sabnzbd.png"
      homepage.href: "https://${SABNZBD_SUBDOMAIN:-sabnzbd}.${DOMAIN}/"
      homepage.description: "Newsgroups"
      homepage.widget.type: "sabnzbd"
      homepage.widget.url: "http://sabnzbd.internal:8085"
      homepage.widget.key: "{{HOMEPAGE_FILE_SABNZBD_API}}"
      traefik.enable: "true"
      traefik.http.routers.sabnzbd.rule: "Host(`${SABNZBD_SUBDOMAIN:-sabnzbd}.${DOMAIN}`)"
      traefik.http.routers.sabnzbd.middlewares: "sabnzbd,tinyauth,error-pages"
      traefik.http.services.sabnzbd.loadbalancer.server.port: "8085"
      traefik.http.middlewares.sabnzbd.headers.accessControlAllowCredentials: "true"
      traefik.http.middlewares.sabnzbd.headers.accessControlAllowOriginList: "https://${DOMAIN}"
    healthcheck:
      start_period: "30s"
      test: "curl --connect-timeout 5 --silent --show-error --fail http://localhost:8085/"

  homepage:
    secrets:
      - sabnzbd_api
    environment:
      HOMEPAGE_FILE_SABNZBD_API: "/run/secrets/sabnzbd_api"

secrets:
  sabnzbd_api:
    environment: "SABNZBD_API"
