services:
  lingarr:
    container_name: lingarr
    image: ${LINGARR_IMAGE:-docker.io/lingarr/lingarr}:${LINGARR_IMAGE_TAG:-latest}
    profiles: [ "${LINGARR_PROFILE:-quality}" ]
    extends:
      file: ../compose.extend.yaml
      service: "gpu-${USE_GPU:-none}"
    restart: unless-stopped
    networks:
      - external # https://github.com/lingarr-translate/lingarr/issues/414
      - internal
    depends_on:
      libretranslate:
        condition: service_started
        restart: false
      traefik:
        condition: service_started
        restart: false
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "3"
    environment:
      DB_CONNECTION: "sqlite"
      SERVICE_TYPE: "libretranslate"
      LIBRE_TRANSLATE_URL: "http://libretranslate.internal:5000"
      RADARR_URL: "http://radarr.internal:7878"
      RADARR_API_KEY: "${RADARR_API:-}"
      SONARR_URL: "http://sonarr.internal:8989"
      SONARR_API_KEY: "${SONARR_API:-}"
    volumes:
      - "/etc/localtime:/etc/localtime:ro"
      - "./config:/app/config"
      - "$PATH_MOVIES:/data/movies"
      - "$PATH_TV:/data/tv"
    labels:
      com.centurylinklabs.watchtower.monitor-only: "true"
      deunhealth.restart.on.unhealthy: "true"
      homepage.group: "Tools"
      homepage.name: "Lingarr"
      homepage.icon: "/images/lingarr.png"
      homepage.href: "https://${LINGARR_SUBDOMAIN:-lingarr}.${DOMAIN}/"
      homepage.description: "Subtitle translation"
      traefik.enable: "true"
      traefik.http.routers.lingarr.rule: "Host(`${LINGARR_SUBDOMAIN:-lingarr}.${DOMAIN}`)"
      traefik.http.routers.lingarr.middlewares: "lingarr,tinyauth,error-pages"
      traefik.http.services.lingarr.loadbalancer.server.port: "8080"
      traefik.http.middlewares.lingarr.headers.accessControlAllowCredentials: "true"
      traefik.http.middlewares.lingarr.headers.accessControlAllowOriginList: "https://${DOMAIN}"
    healthcheck:
      interval: "300s" # Note that it locks up during transcribe, so this must be longer than a movie
      start_period: "30s"
      test: "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/8080'"
