  # - zfs-discord-alerts/compose.yaml #     | tools       | Notify Discord when there are zfs problems |

networks:
  external:
    name: "external"
    driver: bridge
    enable_ipv4: true
    enable_ipv6: true
  internal:
    # No internet access
    name: "internal"
    driver: bridge
    internal: true
    enable_ipv4: true
    enable_ipv6: false
