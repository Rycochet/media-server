services:
  tinyauth:
    secrets:
      - tinyauth_github_client_secret
    environment:
      TINYAUTH_OAUTH_PROVIDERS_GITHUB_CLIENTID: "${TINYAUTH_GITHUB_CLIENT_ID:?You must set TINYAUTH_GITHUB_CLIENT_ID}"
      TINYAUTH_OAUTH_PROVIDERS_GITHUB_CLIENTSECRETFILE: "/run/secrets/tinyauth_github_client_secret"

secrets:
  tinyauth_github_client_secret:
    environment: "TINYAUTH_GITHUB_CLIENT_SECRET"
