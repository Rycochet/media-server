services:
  cloudflared:
    container_name: cloudflared
    image: ${CLOUDFLARED_IMAGE:-cloudflare/cloudflared}:${CLOUDFLARED_IMAGE_TAG:-latest}
    profiles: ["${CLOUDFLARED_PROFILE:-network}"]
    restart: unless-stopped
    networks:
      - external
      - internal
    command: tunnel run
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "3"
    secrets:
      - cloudflared_token
    environment:
      TUNNEL_TOKEN_FILE: "/run/secrets/cloudflared_token"
      TUNNEL_LOGLEVEL: "info"
    labels:
      - "deunhealth.restart.on.unhealthy=true"

      - "homepage.group=Information"
      - "homepage.name=Cloudflared"
      - "homepage.icon=cloudflare.png"
      - "homepage.href=https://dash.cloudflare.com/"
      - "homepage.description=Cloudflare Status"
      - "homepage.widget.type=cloudflared"
      - "homepage.widget.accountid={{HOMEPAGE_FILE_CLOUDFLARED_ACCOUNT_ID}}"
      - "homepage.widget.tunnelid={{HOMEPAGE_FILE_CLOUDFLARED_TUNNEL_ID}}"
      - "homepage.widget.key={{HOMEPAGE_FILE_CLOUDFLARED_API}}"

      - "traefik.enable=false"

    healthcheck:
      interval: "30s"
      timeout: "5s"
      retries: 3
      start_period: "10s"
      test: ["CMD", "cloudflared", "tunnel", "--metrics", "0.0.0.0:20241", "ready"]

  homepage:
    secrets:
      - cloudflared_account_id
      - cloudflared_api
      - cloudflared_tunnel_id
    environment:
      HOMEPAGE_FILE_CLOUDFLARED_ACCOUNT_ID: "/run/secrets/cloudflared_account_id"
      HOMEPAGE_FILE_CLOUDFLARED_API: "/run/secrets/cloudflared_api"
      HOMEPAGE_FILE_CLOUDFLARED_TUNNEL_ID: "/run/secrets/cloudflared_tunnel_id"

secrets:
  cloudflared_api:
    environment: "CLOUDFLARED_API"
  cloudflared_account_id:
    environment: "CLOUDFLARED_ACCOUNT_ID"
  cloudflared_tunnel_id:
    environment: "CLOUDFLARED_TUNNEL_ID"
  cloudflared_token:
    environment: "CLOUDFLARED_TOKEN"
