services:
  deunhealth:
    container_name: deunhealth
    image: ${DEUNHEALTH_IMAGE:-docker.io/qmcgaw/deunhealth}:${DEUNHEALTH_IMAGE_TAG:-latest}
    profiles: ["${DEUNHEALTH_PROFILE:-core}"]
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      socket-proxy:
        condition: service_healthy
        restart: false
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "3"
    environment:
      # Default
      TZ: "${TZ:-Europe/London}"
      # Docker
      DOCKER_HOST: "tcp://socket-proxy.internal:2375"
      # Image
      LOG_LEVEL: "info"
    labels:
      deunhealth.restart.on.unhealthy: "false"
      traefik.enable: "false"
