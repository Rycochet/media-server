services:
  nutcase:
    container_name: nutcase
    image: ${NUTCASE_IMAGE:-docker.io/kronos443/nutcase}:${NUTCASE_IMAGE_TAG:-latest}
    profiles: [ "${NUTCASE_PROFILE:-information}" ]
    restart: unless-stopped
    networks:
      - internal
      - external # needed to access UPS addresses
    depends_on:
      traefik:
        condition: service_started
        restart: false
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "3"
    environment:
      # Default
      TZ: "${TZ:-Europe/London}"
      # Image
      AUTH_DISABLED: "true"
    volumes:
      - "/etc/localtime:/etc/localtime:ro"
      - "./config:/config"
    labels:
      deunhealth.restart.on.unhealthy: "true"
      homepage.group: "Information"
      homepage.name: "Nutcase"
      homepage.icon: "network-ups-tools.png"
      homepage.href: "https://${NUTCASE_SUBDOMAIN:-nutcase}.${DOMAIN}/"
      homepage.description: "Network UPS Tools"
      homepage.widgets[0].type: "customapi"
      homepage.widgets[0].method: "GET"
      homepage.widgets[0].refreshInterval: 60000 # In milliseconds, set to ~60s
      homepage.widgets[0].url: "http://nutcase.internal:9995/json?target=${NUTCASE_UPS:-host.docker.internal:3493}"
      homepage.widgets[0].mappings[0].label: "Battery"
      homepage.widgets[0].mappings[0].field.ups: "battery.charge"
      homepage.widgets[0].mappings[0].format: "text"
      homepage.widgets[0].mappings[0].suffix: "%"
      homepage.widgets[0].mappings[1].label: "Power"
      homepage.widgets[0].mappings[1].field.ups: "ups.load"
      homepage.widgets[0].mappings[1].format: "text"
      homepage.widgets[0].mappings[1].suffix: "%"
      homepage.widgets[0].mappings[2].label: "Runtime"
      homepage.widgets[0].mappings[2].field.ups: "battery.runtime"
      homepage.widgets[0].mappings[2].format: "float"
      homepage.widgets[0].mappings[2].scale: "1/60"
      homepage.widgets[0].mappings[2].suffix: "Min"
      homepage.widgets[0].mappings[3].label: "Status"
      homepage.widgets[0].mappings[3].field.ups: "ups.status"
      homepage.widgets[0].mappings[3].format: "text"
      homepage.widgets[0].mappings[3].remap.0.value: "OL"
      homepage.widgets[0].mappings[3].remap.0.to: "🔌Mains"
      homepage.widgets[0].mappings[3].remap.1.value: "OB"
      homepage.widgets[0].mappings[3].remap.1.to: "🔋Battery"
      traefik.enable: "true"
      traefik.http.routers.nutcase.rule: "Host(`${NUTCASE_SUBDOMAIN:-nutcase}.${DOMAIN}`)"
      traefik.http.routers.nutcase.middlewares: "nutcase,tinyauth,error-pages"
      traefik.http.services.nutcase.loadbalancer.server.port: "9995"
      traefik.http.middlewares.nutcase.headers.accessControlAllowCredentials: "true"
      traefik.http.middlewares.nutcase.headers.accessControlAllowOriginList: "https://${DOMAIN}"
    healthcheck:
      start_period: "30s"
      test: "wget --no-verbose --tries=1 --timeout=5 --spider http://127.0.0.1:9995/help || exit 1"
