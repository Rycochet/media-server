services:
  whoami:
    container_name: whoami
    image: ${WHOAMI_IMAGE:-traefik/whoami}:${WHOAMI_IMAGE_TAG:-latest}
    profiles: [ "${WHOAMI_PROFILE:-network}" ]
    restart: unless-stopped
    read_only: true
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "3"
    depends_on:
      traefik:
        condition: service_started
        restart: false
    labels:
      deunhealth.restart.on.unhealthy: "true"
      homepage.group: "Tools"
      homepage.name: "WhoAmI"
      homepage.icon: "double-take.png"
      homepage.href: "https://${WHOAMI_SUBDOMAIN:-whoami}.${DOMAIN}/"
      homepage.description: "Who... Am... I...?"
      traefik.enable: "true"
      traefik.http.routers.whoami.rule: "Host(`${WHOAMI_SUBDOMAIN:-whoami}.${DOMAIN}`)"
      traefik.http.routers.whoami.middlewares: "tinyauth,error-pages"
      traefik.http.services.whoami.loadbalancer.server.port: "80"
