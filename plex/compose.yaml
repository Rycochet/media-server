services:
  plex:
    container_name: plex
    image: ${PLEX_IMAGE:-plexinc/pms-docker}:${PLEX_IMAGE_TAG:-latest}
    profiles: [ "${PLEX_PROFILE:-library}" ]
    extends:
      file: ../compose.extend.yaml
      service: "cf-${USE_CLOUDFLARED:-true}_gpu-${USE_GPU:-none}"
    restart: unless-stopped
    networks:
      - external
      - internal
    depends_on:
      traefik:
        condition: service_started
        restart: false
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "3"
    ports:
      - "32400:32400"
    environment:
      # Default
      TZ: "${TZ:-Europe/London}"
      # Image
      ADVERTISE_IP: "https://plex.$DOMAIN:443/"
      PLEX_CLAIM: "$PLEX_CLAIM"
      PLEX_GID: "${PGID:-1000}"
      PLEX_UID: "${PUID:-1000}"
    volumes:
      - "./config:/config"
      - "./backup:/data/backup" # TODO: Fix this - /config/Library/Application Support/Plex Media Server/Plug-in Support/Databases ...?
      - "./logs:/config/Library/Application Support/Plex Media Server/Logs"
      - "./tmp:/tmp"
      # These can be worth remapping to a larger / slower drive -
      # - "/large_space/.plex_metadata:/config/Library/Application Support/Plex Media Server/Metadata"
      # - "/large_space/.plex_media:/config/Library/Application Support/Plex Media Server/Media"
      - "$PATH_MOVIES:/data/movies:ro"
      - "$PATH_MUSIC:/data/music:ro"
      - "$PATH_TV:/data/tv:ro"
    labels:
      - "deunhealth.restart.on.unhealthy=true"

      - "homepage.group=Libraries"
      - "homepage.name=Plex"
      - "homepage.icon=plex.png"
      - "homepage.href=https://plex.$DOMAIN/web/index.html"
      - "homepage.weight=-1"
      - "homepage.description=Media Library"
      - "homepage.widgets[0].type=plex"
      - "homepage.widgets[0].url=https://plex:32400"
      - "homepage.widgets[0].key={{HOMEPAGE_FILE_PLEX_TOKEN}}"
      # Leaving space for Tautulli to extend this if it's running

      - "traefik.enable=true"
      - "traefik.http.routers.plex.rule=Host(`plex.$DOMAIN`)"
      - "traefik.http.routers.plex.middlewares=plex,error-pages"
      - "traefik.http.services.plex.loadbalancer.server.port=32400"
      - "traefik.http.services.plex.loadbalancer.server.scheme=https"
      - "traefik.http.middlewares.plex.headers.accessControlAllowCredentials=true"
      - "traefik.http.middlewares.plex.headers.accessControlAllowOriginList=https://$DOMAIN"
      # - "traefik.http.middlewares.plex.redirectregex.regex=^https?://plex.$DOMAIN/$"
      # - "traefik.http.middlewares.plex.redirectregex.replacement=https://plex.$DOMAIN/web/index.html"

    healthcheck:
      start_period: "30s"
      test: "curl --connect-timeout 5 --silent --show-error --fail http://localhost:32400/identity"

  homepage:
    secrets:
      - plex_token
    environment:
      HOMEPAGE_FILE_PLEX_TOKEN: "/run/secrets/plex_token"

  traefik:
    networks:
      internal:
        aliases:
          - "plex.$DOMAIN"

secrets:
  plex_token:
    environment: "PLEX_TOKEN"
