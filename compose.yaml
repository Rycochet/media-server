name: rycochet

# For each of these sections the initial comment is the default PROFILE name
# used for it.
#
# Create a `compose.override.yaml` file, a top level `include:` entry, then copy
# the services that you want to run into it. You can disable a service from
# automatic starts (ie, needing the service name to start it) by editing the
# `PROFILE_<name>` in your `.env` and setting it to `"disabled"`.
#
# To disable a core service can also reset it in the override file:
# ```yaml
# services:
#   vpn: !reset []
# ```

include:
  #                                         | PROFILE     | DESCRIPTION |
  #                                         | ----------- | ----------- |
  - cloudflared/compose.yaml #              | core        | Cloudflare tunnel |
  - deunhealth/compose.yaml #               | core        | Bring unhealthy containers back up |
  - error-pages/compose.yaml #              | core        | Error pages |
  - socket-proxy/compose.yaml #             | core        | Secure access to the docker socket |
  - tinyauth/compose.yaml #                 | core        | OAuth via Google |
  - traefik/compose.yaml #                  | core        | HTTP routing |
  - vpn/compose.yaml #                      | core        | VPN + HTTP Proxy + Socks5 Proxy |
  - watchtower/compose.yaml #               | core        | Auto-update containers |
  #
  # BELOW HERE MUST BE MANUALLY ADDED TO `compose.override.yaml`
  #
  # include:
  # - adguardhome/compose.yaml #            | network     | Ads & trackers blocking DNS server |
  # - audiobookshelf/compose.yaml #         | library     | Audiobooks library |
  # - bazarr/compose.yaml #                 | media       | Subtitles |
  # - beszel/compose.yaml #                 | information | System information |
  # - chaptarr/compose.yaml #               | media       | Books / Audiobooks |
  # - cleanuparr/compose.yaml #             | download    | Bad download handling |
  # - docker-discord-alerts/compose.yaml #  | tools       | Notify Discord when docker containers change |
  # - dozzle/compose.yaml #                 | information | Docker status |
  # - duc/compose.yaml #                    | tools       | Disk usage |
  # - emby/compose.yaml #                   | library     | Media library |
  # - flaresolverr/compose.yaml #           | network     | Cloudflare captcha bypasss |
  # - foundryvtt/compose.yaml #             | games       | Foundry Virtual Tabletop for RPGs |
  # - glances/compose.yaml #                | information | Operating system status |
  # - homepage/compose.yaml #               | information | Dashboard |
  # - i2p/compose.yaml #                    | network     | I2P Client |
  # - imagemaid/compose.yaml #              | quality     | Cleanup Plex image cache |
  # - jellyfin/compose.yaml #               | library     | Open source media library |
  # - kapowarr/compose.yaml #               | library     | Comics |
  # - kometa/compose.yaml #                 | quality     | Poster overlays, collections, playlists for Plex |
  # - komga/compose.yaml #                  | library     | Comic library |
  # - libretranslate/compose.yaml #         | tools       | Translation |
  # - lidarr/compose.yaml #                 | media       | Music |
  # - lingarr/compose.yaml #                | quality     | Subtitle translation |
  # - manyfold/compose.yaml #               | library     | 3d models library |
  # - minecraft/compose.yaml #              | games       | Minecraft |
  # - mylar/compose.yaml #                  | media       | Comics |
  # - neutarr/compose.yaml #                | download    | Missing media search |
  # - notifiarr/compose.yaml #              | tools       | System notifications |
  # - onlyfans/compose.yaml #               | download    | Download all subscriptions |
  # - openspeedtest/compose.yaml #          | network     | Bandwidth test to server |
  # - pgadmin/compose.yaml #                | tools       | Database admin |
  # - plex/compose.yaml #                   | library     | Media library |
  # - plex-find-mismatch/compose.yaml #     | quality     | Finds mismatches between tvdb/tmdb/imdb and Plex |
  # - pocket-id/compose.yaml #              | tools       | Passkey authentication server |
  # - portainer/compose.yaml #              | information | Container management |
  # - postgres/compose.yaml #               | tools       | Database |
  # - prowlarr/compose.yaml #               | download    | Torrent / NNTP search proxy |
  # - qbittorrent/compose.yaml #            | download    | Torrent downloader |
