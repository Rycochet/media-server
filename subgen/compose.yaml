services:
  subgen:
    container_name: subgen
    image: ${SUBGEN_IMAGE:-mccloud/subgen}:${SUBGEN_IMAGE_TAG:-latest}
    profiles: [ "${SUBGEN_PROFILE:-quality}" ]
    extends:
      file: ../compose.extend.yaml
      service: "gpu-${USE_GPU:-none}"
    restart: unless-stopped
    networks:
      - external
      - internal
    # depends_on:
    #   bazarr:
    #     condition: service_started
    #     restart: false
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "3"
    environment:
      # Default
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      # Image
      # APPEND: "False"
      # CLEAR_VRAM_ON_COMPLETE: "True"
      # CONCURRENT_TRANSCRIPTIONS: "2"
      # CUSTOM_MODEL_PROMPT: ""
      # CUSTOM_REGROUP: "cm_sl=84_sl=42++++++1"
      DEBUG: "False"
      DETECT_LANGUAGE_LENGTH: "120"
      LOG_LEVEL: "warn"
      # LRC_FOR_AUDIO_FILES: "True"
      # MODEL_PATH: "./models"
      # NAMESUBLANG: "aa"
      # PATH_MAPPING_FROM: "/tv"
      # PATH_MAPPING_TO: "/Volumes/TV"
      # PROCADDEDMEDIA: "True"
      # PROCMEDIAONPLAY: "False"
      SHOW_IN_SUBNAME_MODEL: "False"
      SHOW_IN_SUBNAME_SUBGEN: "False"
      SKIPIFINTERNALSUBLANG: "xxxxx"
      TRANSCRIBE_DEVICE: "cuda"
      # TRANSCRIBE_FOLDERS: ""
      # UPDATE: "False"
      # USE_MODEL_PROMPT: "False"
      # USE_PATH_MAPPING: "False"
      # WEBHOOKPORT: "9000"
      SUBGEN_MODEL: "distil-large-v3.5"
      # SUBGEN_THREADS: "4"
      # WORD_LEVEL_HIGHLIGHT: "False"
      # WEBHOOK_URL_COMPLETED: ""

      # For auto-transcribe - https://github.com/McCloudS/subgen#-jellyfin
      # JELLYFINSERVER: "http://${JELLYFIN_SUBDOMAIN:-jellyfin}:8096"
      # JELLYFINTOKEN: "${JELLYFIN_API}"
      # PLEXSERVER: "https://${PLEX_SUBDOMAIN:-plex}.${DOMAIN}:443"
      # PLEXTOKEN: "${PLEX_TOKEN}"
    volumes:
      - "/etc/localtime:/etc/localtime:ro"
      - "./config:/subgen/models"
      - "$PATH_MOVIES:/data/movies"
      - "$PATH_TV:/data/tv"
    labels:
      com.centurylinklabs.watchtower.monitor-only: "true"
      deunhealth.restart.on.unhealthy: "false"
      homepage.group: "Tools"
      homepage.name: "Subgen"
      homepage.icon: "/images/subgen.png"
      homepage.description: "Audio transcription"
      traefik.enable: "false"
