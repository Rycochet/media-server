services:
  duc:
    container_name: duc
    image: ${DUC_IMAGE:-tigerdockermediocore/duc-docker}:${DUC_IMAGE_TAG:-1}
    profiles: [ "${DUC_PROFILE:-tools}" ]
    # restart: unless-stopped
    networks:
      - internal
    depends_on:
      traefik:
        condition: service_started
        restart: false
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "3"
    volumes:
      - "$PATH_MOVIES:/host/movies:ro"
      - "$PATH_MUSIC:/host/music:ro"
      - "$PATH_TV:/host/tv:ro"
    labels:
      deunhealth.restart.on.unhealthy: "true"
      homepage.group: "Tools"
      homepage.name: "DUC"
      homepage.icon: "qdirstat.png"
      homepage.href: "https://${DUC_SUBDOMAIN:-duc}.${DOMAIN}/"
      homepage.description: "Disk usage analyzer"
      traefik.enable: "true"
      traefik.http.routers.duc.rule: "Host(`${DUC_SUBDOMAIN:-duc}.${DOMAIN}`)"
      traefik.http.routers.duc.middlewares: "duc,tinyauth,error-pages"
      traefik.http.services.duc.loadbalancer.server.port: "80"
      traefik.http.middlewares.duc.headers.accessControlAllowCredentials: "true"
      traefik.http.middlewares.duc.headers.accessControlAllowOriginList: "https://${DOMAIN}"
    healthcheck:
      start_period: "30s"
      test: "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/80'"
